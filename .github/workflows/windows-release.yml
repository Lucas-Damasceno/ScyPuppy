name: Windows build and release

on:
  pull_request:
    paths:
      - ".github/workflows/windows-release.yml"
      - ".github/workflows/automatic-beta-release.yml"
      - ".github/dependabot.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
  push:
    tags:
      - "v*.*.0-beta.*"
  workflow_dispatch:
  workflow_call:
    inputs:
      automatic_release:
        description: Build and publish the next beta after an eligible PR merge.
        required: false
        default: false
        type: boolean
      pull_request_number:
        description: Pull request that owns the automatic beta release.
        required: false
        default: 0
        type: number
      source_ref:
        description: Exact merged commit to build.
        required: false
        default: ""
        type: string
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        description: Private updater key generated by the Tauri signer.
        required: false
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        description: Optional password for the updater signing key.
        required: false

concurrency:
  group: >-
    ${{ inputs.automatic_release &&
        'windows-automatic-beta-release' ||
        format('windows-release-{0}', github.ref) }}
  cancel-in-progress: >-
    ${{ !inputs.automatic_release && github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Validate and build Windows installer
    runs-on: windows-latest
    timeout-minutes: 60
    outputs:
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
      installer_name: ${{ steps.metadata.outputs.installer_name }}
      checksum_name: ${{ steps.metadata.outputs.checksum_name }}
      signature_name: ${{ steps.metadata.outputs.signature_name }}
      public_version: ${{ steps.metadata.outputs.public_version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      manifest_version: ${{ steps.metadata.outputs.manifest_version }}
      automatic_release: ${{ steps.metadata.outputs.automatic_release }}
      existing_release_tag: ${{ steps.metadata.outputs.existing_release_tag }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_ref || github.sha }}
          fetch-depth: ${{ inputs.automatic_release && '0' || '1' }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Restore Rust build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-rust-

      - name: Resolve and validate release metadata
        id: metadata
        shell: pwsh
        env:
          AUTOMATIC_RELEASE: ${{ inputs.automatic_release }}
          PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
        run: |
          if ($env:AUTOMATIC_RELEASE -eq "true") {
            ./scripts/prepare-beta-release.ps1 `
              -PullRequestNumber ([int]$env:PULL_REQUEST_NUMBER) `
              -GitHubOutput
          } else {
            ./scripts/release-metadata.ps1 -GitHubOutput
            "automatic_release=false" >> $env:GITHUB_OUTPUT
            "existing_release_tag=false" >> $env:GITHUB_OUTPUT
            "pull_request_number=0" >> $env:GITHUB_OUTPUT
          }

      - name: Test portable SHA-256 helper
        shell: pwsh
        run: |
          $portableHash = ./scripts/file-sha256.ps1 -Path package-lock.json
          $nodeHash = node -e "const crypto = require('node:crypto'); const fs = require('node:fs'); process.stdout.write(crypto.createHash('sha256').update(fs.readFileSync(process.argv[1])).digest('hex'));" package-lock.json
          if ($portableHash -ne $nodeHash) {
            throw "The portable SHA-256 helper returned an unexpected digest."
          }
          Write-Host "Portable SHA-256 helper verified: $portableHash"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          EXPECTED_TAG: ${{ steps.metadata.outputs.release_tag }}
          ACTUAL_TAG: ${{ github.ref_name }}
        run: |
          if ($env:ACTUAL_TAG -ne $env:EXPECTED_TAG) {
            throw "Tag '$env:ACTUAL_TAG' does not match manifest version tag '$env:EXPECTED_TAG'."
          }

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm run test:frontend

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --lib --locked -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --locked

      - name: Build and smoke-test Windows installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ (startsWith(github.ref, 'refs/tags/') || inputs.automatic_release == true) && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ (startsWith(github.ref, 'refs/tags/') || inputs.automatic_release == true) && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          REQUIRE_UPDATER_SIGNATURE: ${{ startsWith(github.ref, 'refs/tags/') || inputs.automatic_release == true }}
        run: npm run build:windows

      - name: Create SHA-256 checksum
        id: checksum
        shell: pwsh
        env:
          INSTALLER_PATH: ${{ steps.metadata.outputs.installer_path }}
          INSTALLER_NAME: ${{ steps.metadata.outputs.installer_name }}
          CHECKSUM_PATH: ${{ steps.metadata.outputs.checksum_path }}
        run: |
          if (-not (Test-Path -LiteralPath $env:INSTALLER_PATH)) {
            throw "Expected installer was not created: $env:INSTALLER_PATH"
          }
          $hash = ./scripts/file-sha256.ps1 -Path $env:INSTALLER_PATH
          "$hash  $env:INSTALLER_NAME" | Set-Content -LiteralPath $env:CHECKSUM_PATH -Encoding ascii
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          Write-Host "Installer SHA-256: $hash"

      - name: Validate updater signature
        if: startsWith(github.ref, 'refs/tags/') || inputs.automatic_release == true
        shell: pwsh
        env:
          SIGNATURE_PATH: ${{ steps.metadata.outputs.signature_path }}
        run: |
          if (-not (Test-Path -LiteralPath $env:SIGNATURE_PATH)) {
            throw "Expected updater signature was not created: $env:SIGNATURE_PATH"
          }

      - name: Upload short-lived validation artifact
        if: ${{ !(startsWith(github.ref, 'refs/tags/') || inputs.automatic_release == true) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: |
            ${{ steps.metadata.outputs.installer_path }}
            ${{ steps.metadata.outputs.checksum_path }}
          if-no-files-found: error
          retention-days: 1

      - name: Upload signed release artifact
        if: startsWith(github.ref, 'refs/tags/') || inputs.automatic_release == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: |
            ${{ steps.metadata.outputs.installer_path }}
            ${{ steps.metadata.outputs.checksum_path }}
            ${{ steps.metadata.outputs.signature_path }}
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Attest and publish GitHub prerelease
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.build.outputs.automatic_release == 'true'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out automatic release source
        if: needs.build.outputs.automatic_release == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Create or reuse automatic release tag
        if: needs.build.outputs.automatic_release == 'true'
        shell: pwsh
        env:
          EXISTING_RELEASE_TAG: ${{ needs.build.outputs.existing_release_tag }}
          MANIFEST_VERSION: ${{ needs.build.outputs.manifest_version }}
          PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ($env:EXISTING_RELEASE_TAG -eq "true") {
            git checkout --detach $env:RELEASE_TAG
            if ($LASTEXITCODE -ne 0) {
              throw "Could not check out existing tag '$env:RELEASE_TAG'."
            }
          } else {
            ./scripts/set-release-version.ps1 -Version $env:MANIFEST_VERSION
            git add -- `
              package.json `
              package-lock.json `
              src-tauri/Cargo.toml `
              src-tauri/Cargo.lock `
              src-tauri/tauri.conf.json `
              README.md
            git commit -m "chore(release): $env:RELEASE_TAG [skip ci]"
            if ($LASTEXITCODE -ne 0) {
              throw "Could not create the automatic version commit."
            }
            git tag -a $env:RELEASE_TAG -m "ScryPuppy-PR:$env:PULL_REQUEST_NUMBER"
            if ($LASTEXITCODE -ne 0) {
              throw "Could not create automatic release tag '$env:RELEASE_TAG'."
            }
            git push origin $env:RELEASE_TAG
            if ($LASTEXITCODE -ne 0) {
              throw "Could not push automatic release tag '$env:RELEASE_TAG'."
            }
          }

      - name: Download validated installer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release

      - name: Attest installer provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release/${{ needs.build.outputs.installer_name }}

      - name: Publish GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INSTALLER_NAME: ${{ needs.build.outputs.installer_name }}
          CHECKSUM_NAME: ${{ needs.build.outputs.checksum_name }}
          SIGNATURE_NAME: ${{ needs.build.outputs.signature_name }}
          PUBLIC_VERSION: ${{ needs.build.outputs.public_version }}
          MANIFEST_VERSION: ${{ needs.build.outputs.manifest_version }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "release/$INSTALLER_NAME" \
              "release/$CHECKSUM_NAME" \
              "release/$SIGNATURE_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --title "ScryPuppy Beta v$PUBLIC_VERSION"
          else
            gh release create "$RELEASE_TAG" \
              "release/$INSTALLER_NAME" \
              "release/$CHECKSUM_NAME" \
              "release/$SIGNATURE_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --prerelease \
              --title "ScryPuppy Beta v$PUBLIC_VERSION" \
              --generate-notes
          fi

          release_notes="$(gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json body \
            --jq '.body // ""')"
          download_url="https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/$INSTALLER_NAME"
          published_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          signature="$(cat "release/$SIGNATURE_NAME")"

          jq -n \
            --arg version "$MANIFEST_VERSION" \
            --arg notes "$release_notes" \
            --arg pub_date "$published_at" \
            --arg url "$download_url" \
            --arg signature "$signature" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  url: $url,
                  signature: $signature
                }
              }
            }' > release/latest.json

          if gh release view updater-beta --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload updater-beta \
              release/latest.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit updater-beta \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --title "ScryPuppy Beta update channel" \
              --notes "Machine-readable update channel used by installed beta versions of ScryPuppy."
          else
            gh release create updater-beta \
              release/latest.json \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --title "ScryPuppy Beta update channel" \
              --notes "Machine-readable update channel used by installed beta versions of ScryPuppy."
          fi

      - name: Synchronize released version to main
        if: needs.build.outputs.automatic_release == 'true'
        shell: pwsh
        env:
          MANIFEST_VERSION: ${{ needs.build.outputs.manifest_version }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $targetMatch = [regex]::Match(
            $env:MANIFEST_VERSION,
            '^(?<major>\d+)\.(?<minor>\d+)\.0-beta\.(?<beta>\d+)$'
          )
          if (-not $targetMatch.Success) {
            throw "Unsupported automatic release version '$env:MANIFEST_VERSION'."
          }

          for ($attempt = 1; $attempt -le 5; $attempt++) {
            git fetch origin main
            if ($LASTEXITCODE -ne 0) {
              throw "Could not fetch main while synchronizing the release version."
            }
            git switch --force-create automatic-version-sync origin/main
            if ($LASTEXITCODE -ne 0) {
              throw "Could not create the automatic version synchronization branch."
            }

            $current = ./scripts/release-metadata.ps1 | ConvertFrom-Json
            $currentMatch = [regex]::Match(
              $current.manifest_version,
              '^(?<major>\d+)\.(?<minor>\d+)\.0-beta\.(?<beta>\d+)$'
            )
            if (-not $currentMatch.Success) {
              throw "Main contains an unsupported version '$($current.manifest_version)'."
            }
            if (
              $currentMatch.Groups["major"].Value -ne $targetMatch.Groups["major"].Value -or
              $currentMatch.Groups["minor"].Value -ne $targetMatch.Groups["minor"].Value
            ) {
              throw "Main and the automatic release use different version lines."
            }

            $currentBeta = [int]$currentMatch.Groups["beta"].Value
            $targetBeta = [int]$targetMatch.Groups["beta"].Value
            if ($currentBeta -gt $targetBeta) {
              Write-Host "Main already contains newer beta $currentBeta; no version sync is needed."
              exit 0
            }

            ./scripts/set-release-version.ps1 -Version $env:MANIFEST_VERSION
            git add -- `
              package.json `
              package-lock.json `
              src-tauri/Cargo.toml `
              src-tauri/Cargo.lock `
              src-tauri/tauri.conf.json `
              README.md
            git diff --cached --quiet
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Main already contains $env:MANIFEST_VERSION and matching README text."
              exit 0
            }
            git commit -m "chore(release): sync $env:RELEASE_TAG [skip ci]"
            if ($LASTEXITCODE -ne 0) {
              throw "Could not commit the synchronized release version."
            }
            git push origin HEAD:main
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Main synchronized to $env:MANIFEST_VERSION."
              exit 0
            }

            if ($attempt -lt 5) {
              Write-Warning "Main advanced during version sync; retrying ($attempt/5)."
              Start-Sleep -Seconds (2 * $attempt)
            }
          }

          throw "Could not synchronize $env:MANIFEST_VERSION to main after five attempts."
