name: Windows build and release

on:
  pull_request:
    paths:
      - ".github/workflows/windows-release.yml"
      - ".github/dependabot.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
  push:
    tags:
      - "v*.*.0-beta.*"
  workflow_dispatch:

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Validate and build Windows installer
    runs-on: windows-latest
    timeout-minutes: 60
    outputs:
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
      installer_name: ${{ steps.metadata.outputs.installer_name }}
      checksum_name: ${{ steps.metadata.outputs.checksum_name }}
      public_version: ${{ steps.metadata.outputs.public_version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Restore Rust build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-rust-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Resolve and validate release metadata
        id: metadata
        shell: pwsh
        run: ./scripts/release-metadata.ps1 -GitHubOutput

      - name: Test portable SHA-256 helper
        shell: pwsh
        run: |
          $portableHash = ./scripts/file-sha256.ps1 -Path package-lock.json
          $nodeHash = node -e "const crypto = require('node:crypto'); const fs = require('node:fs'); process.stdout.write(crypto.createHash('sha256').update(fs.readFileSync(process.argv[1])).digest('hex'));" package-lock.json
          if ($portableHash -ne $nodeHash) {
            throw "The portable SHA-256 helper returned an unexpected digest."
          }
          Write-Host "Portable SHA-256 helper verified: $portableHash"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          EXPECTED_TAG: ${{ steps.metadata.outputs.release_tag }}
          ACTUAL_TAG: ${{ github.ref_name }}
        run: |
          if ($env:ACTUAL_TAG -ne $env:EXPECTED_TAG) {
            throw "Tag '$env:ACTUAL_TAG' does not match manifest version tag '$env:EXPECTED_TAG'."
          }

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm run test:frontend

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --lib --locked -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib --locked

      - name: Build and smoke-test Windows installer
        run: npm run build:windows

      - name: Create SHA-256 checksum
        id: checksum
        shell: pwsh
        env:
          INSTALLER_PATH: ${{ steps.metadata.outputs.installer_path }}
          INSTALLER_NAME: ${{ steps.metadata.outputs.installer_name }}
          CHECKSUM_PATH: ${{ steps.metadata.outputs.checksum_path }}
        run: |
          if (-not (Test-Path -LiteralPath $env:INSTALLER_PATH)) {
            throw "Expected installer was not created: $env:INSTALLER_PATH"
          }
          $hash = ./scripts/file-sha256.ps1 -Path $env:INSTALLER_PATH
          "$hash  $env:INSTALLER_NAME" | Set-Content -LiteralPath $env:CHECKSUM_PATH -Encoding ascii
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          Write-Host "Installer SHA-256: $hash"

      - name: Upload short-lived build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: |
            ${{ steps.metadata.outputs.installer_path }}
            ${{ steps.metadata.outputs.checksum_path }}
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Attest and publish GitHub prerelease
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download validated installer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release

      - name: Attest installer provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release/${{ needs.build.outputs.installer_name }}

      - name: Publish GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INSTALLER_NAME: ${{ needs.build.outputs.installer_name }}
          CHECKSUM_NAME: ${{ needs.build.outputs.checksum_name }}
          PUBLIC_VERSION: ${{ needs.build.outputs.public_version }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            "release/$INSTALLER_NAME" \
            "release/$CHECKSUM_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --prerelease \
            --title "ScryPuppy Beta v$PUBLIC_VERSION" \
            --generate-notes
